<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
    .dashboard-container { display: flex; }
    .sidebar { width: 250px; background: linear-gradient(180deg,#6f42c1,#4e2a84); color: white; min-height: 100vh; position: relative; }
    .sidebar .nav-link { color: white; padding: 12px 20px; transition: 0.3s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: rgba(255,255,255,0.2); }
    .logout-link { position: absolute; bottom: 20px; width: 100%; }
    .main-content { flex: 1; padding: 30px; }
    .card-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
  </style>
</head>

<body>

<div class="dashboard-container">

  <div class="sidebar">
    <div class="p-4 text-center border-bottom">
      <i class="bi bi-person-circle fs-1"></i>
      <h5 class="fw-bold mt-2">Patient</h5>
      <p class="small">Active Patient</p>
    </div>

    <nav class="nav flex-column">
      <a class="nav-link active" href="patient-dashboard.html">
        <i class="bi bi-house-door-fill me-2"></i>Dashboard
      </a>
      <a class="nav-link" href="doctors.html">
        <i class="bi bi-person-badge-fill me-2"></i>Doctors
      </a>
      <a class="nav-link" href="appointment_list.html">
        <i class="bi bi-calendar-check-fill me-2"></i>Appointments
      </a>
      <a class="nav-link" href="profile.html">
        <i class="bi bi-person-circle me-2"></i>Profile
      </a>
    </nav>

    <div class="logout-link text-center">
      <a class="nav-link" id="logoutBtn" href="#">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </a>
    </div>
  </div>

  <div class="main-content">
    <h4 class="mb-4 text-primary">Upcoming Appointment</h4>
    <div id="appointmentContent" class="card-box">
      <p class="text-muted">Loading appointment...</p>
    </div>
  </div>

</div>

<script>

const token = sessionStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

async function loadUpcoming() {

  try {

    const res = await fetch("http://localhost:3000/patient/upcoming", {
      headers: { "Authorization": "Bearer " + token }
    });

    if (res.status === 401 || res.status === 403) {
      alert("Session expired. Please login again.");
      sessionStorage.removeItem("token");
      window.location.href = "login.html";
      return;
    }

    const data = await res.json();
    const container = document.getElementById("appointmentContent");

    if (!data) {
      container.innerHTML = `<p class="text-muted">No upcoming appointment.</p>`;
      return;
    }

    let html = `
      <div>
        <h5 class="fw-bold">Dr. ${data.doctor_name}</h5>
        <p>
          <b>Date:</b> ${data.appointment_date}<br>
          <b>Time:</b> ${data.appointment_time}
        </p>
    `;

    // 🔥 NEW LOGIC — Direct Zoom Redirect
    if (data.meeting_link) {
      html += `
        <a href="${data.meeting_link}" 
           target="_blank"
           class="btn btn-success">
          <i class="bi bi-camera-video-fill me-2"></i>
          Join Video Consultation
        </a>
      `;
    } else {
      html += `
        <span class="badge bg-warning text-dark">
          Waiting for Doctor to Accept Appointment
        </span>
      `;
    }

    html += `</div>`;

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    document.getElementById("appointmentContent").innerHTML =
      `<p class='text-danger'>Server error. Please try again.</p>`;
  }
}

loadUpcoming();
setInterval(loadUpcoming, 5000);

document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.removeItem("token");
  window.location.href = "login.html";
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
