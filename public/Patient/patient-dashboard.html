<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root {
      --patient-sidebar: #0f172a;
      --patient-accent: #0d9488; /* Teal */
      --gradient-health: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
      --bg-soft: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-soft);
      margin: 0;
      display: flex;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 260px;
      background: var(--patient-sidebar);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-health);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      color: #94a3b8;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 12px;
      font-weight: 500;
      transition: 0.3s;
    }

    .sidebar .nav-link i { margin-right: 12px; font-size: 1.1rem; }

    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar .nav-link.active {
      background: var(--patient-accent);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    .welcome-banner {
      background: var(--gradient-health);
      color: white;
      padding: 40px;
      border-radius: 24px;
      margin-bottom: 35px;
      box-shadow: 0 10px 20px rgba(13, 148, 136, 0.2);
    }

    .welcome-banner h1 { font-weight: 700; }

    /* Appointment Card Styling */
    .card-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .doctor-avatar {
      width: 60px;
      height: 60px;
      background: #f1f5f9;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--patient-accent);
      font-size: 1.5rem;
    }

    .btn-join {
      background: var(--gradient-health);
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
    }

    .btn-join:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .logout-link { position: absolute; bottom: 30px; width: 100%; }
    .logout-btn { color: #f87171 !important; }

    .status-badge {
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo-container">
    <h4>CLINIC PRO</h4>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link active" href="patient-dashboard.html">
      <i class="bi bi-grid-1x2-fill"></i>Dashboard
    </a>
    <a class="nav-link" href="doctors.html">
      <i class="bi bi-person-plus-fill"></i>Find Doctors
    </a>
    <a class="nav-link" href="appointment_list.html">
      <i class="bi bi-calendar3"></i>My Visits
    </a>
    <a class="nav-link" href="profile.html">
      <i class="bi bi-gear-fill"></i>Settings
    </a>
  </nav>

  <div class="logout-link">
    <a class="nav-link logout-btn" id="logoutBtn" href="#">
      <i class="bi bi-box-arrow-right"></i>Logout
    </a>
  </div>
</div>

<div class="main-content">
  <div class="welcome-banner">
    <h1>Hello, Patient!</h1>
    <p class="mb-0">Stay on top of your health. Check your upcoming sessions below.</p>
  </div>

  <h4 class="mb-4 fw-bold text-dark">Upcoming Consultation</h4>
  <div id="appointmentContent" class="card-box">
    <div class="d-flex align-items-center gap-3">
        <div class="spinner-border text-teal" role="status"></div>
        <span class="text-muted">Fetching your schedule...</span>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem("token");
if (!token) window.location.href = "login.html";

async function loadUpcoming() {
  try {
    const res = await fetch("http://localhost:3000/patient/upcoming", {
      headers: { "Authorization": "Bearer " + token }
    });

    if (res.status === 401 || res.status === 403) {
      sessionStorage.removeItem("token");
      window.location.href = "login.html";
      return;
    }

    const data = await res.json();
    const container = document.getElementById("appointmentContent");

    if (!data) {
      container.innerHTML = `
        <div class="text-center py-4">
            <i class="bi bi-calendar-x fs-1 text-muted"></i>
            <p class="mt-2 text-muted">No appointments scheduled yet.</p>
            <a href="doctors.html" class="btn btn-outline-primary btn-sm">Book One Now</a>
        </div>`;
      return;
    }

    let html = `
      <div class="d-md-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
          <div class="doctor-avatar">
            <i class="bi bi-person-heart"></i>
          </div>
          <div>
            <h5 class="fw-bold mb-1">Dr. ${data.doctor_name}</h5>
            <div class="text-muted small">
              <i class="bi bi-calendar-event me-1"></i> ${data.appointment_date} &nbsp; 
              <i class="bi bi-clock me-1"></i> ${data.appointment_time}
            </div>
          </div>
        </div>
        <div class="mt-3 mt-md-0">
    `;

    if (data.meeting_link) {
      html += `
        <a href="${data.meeting_link}" target="_blank" class="btn btn-primary btn-join text-white">
          <i class="bi bi-camera-video me-2"></i> Join Consultation
        </a>
      `;
    } else {
      html += `
        <span class="status-badge bg-warning bg-opacity-10 text-warning border border-warning">
          <i class="bi bi-hourglass-split me-1"></i> Awaiting Confirmation
        </span>
      `;
    }

    html += `</div></div>`;
    container.innerHTML = html;

  } catch (error) {
    container.innerHTML = `<p class='text-danger'>Unable to connect to server.</p>`;
  }
}

loadUpcoming();
setInterval(loadUpcoming, 10000); // Polling every 10s for better performance

document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.removeItem("token");
  window.location.href = "login.html";
});
</script>

</body>
</html>
