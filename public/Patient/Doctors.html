<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctors - Patient Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background-color: #f4f6f9;
  font-family: Arial;
}

.dashboard-container {
  display: flex;
}

.sidebar {
  width: 250px;
  background-color: #007bff;
  color: white;
  min-height: 100vh;
  position: relative;
}

.sidebar .nav-link {
  color: white;
  padding: 12px 20px;
}

.sidebar .nav-link:hover,
.sidebar .nav-link.active {
  background-color: rgba(255,255,255,0.2);
}

.logout-link {
  position: absolute;
  bottom: 20px;
  width: 100%;
}

.main-content {
  flex: 1;
  padding: 30px;
}

.doctor-card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.doctor-card:hover {
  transform: translateY(-5px);
}

.star {
  color: gold;
}
</style>
</head>

<body>

<div class="dashboard-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="p-4 text-center border-bottom">
      <h5 class="fw-bold">Patient Portal</h5>
    </div>

    <nav class="nav flex-column">
      <a class="nav-link" href="patient-dashboard.html">
        <i class="bi bi-house-door-fill me-2"></i>Dashboard
      </a>
      <a class="nav-link active" href="#">
        <i class="bi bi-person-badge-fill me-2"></i>Doctors
      </a>
      <a class="nav-link" href="appointment_list.html">
        <i class="bi bi-calendar-check-fill me-2"></i>Appointments
      </a>
      <a class="nav-link" href="profile.html">
        <i class="bi bi-person-circle me-2"></i>Profile
      </a>
    </nav>

    <div class="logout-link text-center">
      <a class="nav-link" id="logoutBtn" href="#">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <h3 class="mb-4 text-primary">Available Doctors</h3>

    <!-- Search Box -->
    <div class="mb-4">
      <input type="text" id="searchInput" class="form-control"
        placeholder="Search by name, specialization or city">
    </div>

    <div class="row g-4" id="doctorList"></div>

  </div>

</div>

<script>

// =======================
// AUTH CHECK
// =======================
const token = sessionStorage.getItem("token");
if(!token){
  window.location.href = "../login.html";
}

// =======================
// LOGOUT
// =======================
document.getElementById("logoutBtn").addEventListener("click", function(e){
  e.preventDefault();
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
});

// =======================
// FETCH DOCTORS
// =======================
let doctors = [];

async function fetchDoctors(){

  try{
    const response = await fetch(
      "http://localhost:3000/patient/available/doctors",
      {
        headers:{
          "Authorization":"Bearer " + token
        }
      }
    );

    doctors = await response.json();
    displayDoctors(doctors);

  }catch(error){
    console.error("Error fetching doctors:", error);
  }
}

// =======================
// DISPLAY DOCTORS
// =======================
function displayDoctors(data){

  const container = document.getElementById("doctorList");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<p>No doctors found.</p>";
    return;
  }

  data.forEach(doc => {

    const stars = generateStars(doc.rating || 4);

    container.innerHTML += `
      <div class="col-md-4">
        <div class="doctor-card">
          <h5>${doc.name}</h5>

          <p class="text-muted">
            ${doc.specialization || "General Physician"} <br>
            <small>
              <i class="bi bi-geo-alt-fill"></i> ${doc.city || "Unknown City"}
            </small>
          </p>

          <div>${stars}</div>

          <a href="appointment.html?doctorId=${doc.id}"
             class="btn btn-outline-primary btn-sm w-100 mt-3">
             Book Appointment
          </a>
        </div>
      </div>
    `;
  });
}

// =======================
// STAR GENERATOR
// =======================
function generateStars(rating){
  let stars = "";
  for(let i=1; i<=5; i++){
    stars += i <= rating
      ? '<i class="bi bi-star-fill star"></i>'
      : '<i class="bi bi-star"></i>';
  }
  return stars;
}

// =======================
// SEARCH FUNCTION
// =======================
document.getElementById("searchInput").addEventListener("keyup", function(){

  const value = this.value.toLowerCase();

  const filtered = doctors.filter(doc =>
    doc.name.toLowerCase().includes(value) ||
    (doc.specialization && doc.specialization.toLowerCase().includes(value)) ||
    (doc.city && doc.city.toLowerCase().includes(value))
  );

  displayDoctors(filtered);
});

// Load doctors
fetchDoctors();

</script>

</body>
</html>
