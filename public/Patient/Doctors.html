<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Doctors | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #0d9488;
      --gradient-health: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
      --bg-soft: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-soft);
      margin: 0;
      display: flex;
    }

    /* Sidebar (Consistent Branding) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-health);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      color: #94a3b8;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 12px;
      font-weight: 500;
      transition: 0.3s;
      text-decoration: none;
    }

    .sidebar .nav-link i { margin-right: 12px; font-size: 1.1rem; }

    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar .nav-link.active {
      background: var(--accent-color);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }

    /* Content Area */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    h3 { font-weight: 700; color: #1e293b; }

    /* Search Bar Styling */
    .search-container {
      background: white;
      padding: 10px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }

    .search-container i { color: var(--accent-color); padding: 0 15px; font-size: 1.2rem; }

    .search-container input {
      border: none;
      box-shadow: none !important;
      padding: 10px;
      font-size: 1rem;
    }

    /* Doctor Card Styling */
    .doctor-card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      border: 1px solid #f1f5f9;
      transition: all 0.3s ease;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .doctor-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      border-color: var(--accent-color);
    }

    .doc-img-placeholder {
      width: 80px;
      height: 80px;
      background: var(--bg-soft);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--accent-color);
      margin-bottom: 15px;
    }

    .badge-specialty {
      background: #e0f2f1;
      color: #00796b;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .star-rating { color: #fbbf24; font-size: 0.9rem; margin: 10px 0; }

    .btn-book {
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
    }

    .btn-book:hover {
      background: #0b7a6f;
      color: white;
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
    }

    .logout-link { position: absolute; bottom: 30px; width: 100%; }
    .logout-btn { color: #f87171 !important; text-decoration: none; }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo-container">
    <h4>CLINIC PRO</h4>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link" href="patient-dashboard.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a>
    <a class="nav-link active" href="#"><i class="bi bi-person-plus-fill"></i>Find Doctors</a>
    <a class="nav-link" href="appointment_list.html"><i class="bi bi-calendar3"></i>My Visits</a>
    <a class="nav-link" href="profile.html"><i class="bi bi-gear-fill"></i>Settings</a>
  </nav>

  <div class="logout-link">
    <a class="nav-link logout-btn" id="logoutBtn" href="#"><i class="bi bi-box-arrow-right"></i>Logout</a>
  </div>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
      <h3>Available Doctors</h3>
      <span class="badge bg-white text-dark border p-2 px-3 rounded-pill">
        <i class="bi bi-shield-check text-success"></i> Verified Professionals
      </span>
  </div>

  <div class="search-container">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" class="form-control" placeholder="Search by name, specialty, or location...">
  </div>

  <div class="row g-4" id="doctorList">
    <div class="col-12 text-center text-muted py-5">
        <div class="spinner-border text-teal mb-3"></div>
        <p>Scanning for best doctors...</p>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem("token");
if(!token) window.location.href = "../login.html";

document.getElementById("logoutBtn").addEventListener("click", (e) => {
  e.preventDefault();
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
});

let doctors = [];

async function fetchDoctors(){
  try {
    const response = await fetch("http://localhost:3000/patient/available/doctors", {
      headers:{ "Authorization":"Bearer " + token }
    });
    doctors = await response.json();
    displayDoctors(doctors);
  } catch(error) {
    document.getElementById("doctorList").innerHTML = `<p class="text-danger text-center w-100">Failed to load doctor database.</p>`;
  }
}

function displayDoctors(data){
  const container = document.getElementById("doctorList");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = `<div class="col-12 text-center py-5"><i class="bi bi-search fs-1 opacity-25"></i><p class="mt-3">No matching doctors found.</p></div>`;
    return;
  }

  data.forEach(doc => {
    container.innerHTML += `
      <div class="col-xl-3 col-lg-4 col-md-6">
        <div class="doctor-card">
          <div class="doc-img-placeholder">
            <i class="bi bi-person-vcard"></i>
          </div>
          <span class="badge-specialty">${doc.specialization || "General Physician"}</span>
          <h5 class="fw-bold mb-1">${doc.name}</h5>
          <p class="text-muted small mb-2">
            <i class="bi bi-geo-alt"></i> ${doc.city || "India"}
          </p>
          <div class="star-rating">${generateStars(doc.rating || 4)}</div>
          <a href="appointment.html?doctorId=${doc.id}" class="btn btn-book mt-auto">
            Book Visit
          </a>
        </div>
      </div>
    `;
  });
}

function generateStars(rating){
  let stars = "";
  for(let i=1; i<=5; i++){
    stars += `<i class="bi bi-star${i <= rating ? '-fill' : ''}"></i> `;
  }
  return stars;
}

document.getElementById("searchInput").addEventListener("keyup", function(){
  const value = this.value.toLowerCase();
  const filtered = doctors.filter(doc =>
    doc.name.toLowerCase().includes(value) ||
    (doc.specialization && doc.specialization.toLowerCase().includes(value)) ||
    (doc.city && doc.city.toLowerCase().includes(value))
  );
  displayDoctors(filtered);
});

fetchDoctors();
</script>

</body>
</html>
