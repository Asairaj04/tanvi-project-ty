<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Registration</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: linear-gradient(
          rgba(255, 255, 255, 0.75),
          rgba(255, 255, 255, 0.75)
        ),
        url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .registration-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 15px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .btn-register {
      background: #6f42c1;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="registration-box">
    <h2 class="text-center mb-4">Patient Registration</h2>

    <form id="patientForm">

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control" required pattern="[A-Za-z\s]+" />
      </div>

      <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" id="address" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Mobile Number</label>
        <input
          type="tel"
          id="mobile_number"
          class="form-control"
          required
          pattern="[0-9]{10}"
          maxlength="10"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          required
          pattern="^(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-control"
          required
        />
      </div>

      <!-- ✅ Show Password Checkbox -->
      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="showPassword"
        />
        <label class="form-check-label" for="showPassword">
          Show Password
        </label>
      </div>

      <button type="submit" class="btn btn-register">
        Register
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById("patientForm");
    const showPassword = document.getElementById("showPassword");
    const passwordField = document.getElementById("password");
    const confirmPasswordField = document.getElementById("confirmPassword");

    // ✅ Toggle Password Visibility
    showPassword.addEventListener("change", () => {
      const type = showPassword.checked ? "text" : "password";
      passwordField.type = type;
      confirmPasswordField.type = type;
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const address = document.getElementById("address").value;
      const mobile_number = document.getElementById("mobile_number").value;
      const email = document.getElementById("email").value;
      const password = passwordField.value;
      const confirmPassword = confirmPasswordField.value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      try {
        const res = await fetch("http://localhost:3000/register_patient", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            address,
            mobile_number,
            email,
            password
          }),
        });

        const data = await res.json();
        alert(data.message);
        form.reset();
      } catch (err) {
        alert("Registration failed");
      }
    });
  </script>
</body>
</html>
