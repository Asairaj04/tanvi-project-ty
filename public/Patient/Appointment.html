<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Booking</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { min-height:100vh; background:#f4f6f9; font-family:'Segoe UI'; }
.booking-card {
  max-width:750px;
  margin:60px auto;
  border-radius:20px;
  background:#ffffff;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  padding:30px;
}
h3 {
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#0d6efd,#0dcaf0);
  padding:12px;
  border-radius:12px;
  text-align:center;
}
.time-slot {
  cursor:pointer;
  border-radius:12px;
  padding:10px 18px;
  margin:6px;
  border:1px solid #0d6efd;
  display:inline-block;
  background:#f8fbff;
}
.selected-slot { background:#0d6efd; color:white; }
.summary-box {
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#e9f5ff;
  display:none;
}
.btn-primary { border-radius:12px; font-weight:600; }
</style>
</head>

<body>

<div class="card booking-card">

<h3 class="mb-4">Book Appointment</h3>

<div class="mb-3">
  <label><strong>Doctor</strong></label>
  <input type="text" id="doctorName" class="form-control" readonly>
</div>

<div class="mb-3">
  <label><strong>Specialization</strong></label>
  <input type="text" id="doctorSpecialization" class="form-control" readonly>
</div>

<div class="mb-3">
  <label><strong>Available Time</strong></label>
  <input type="text" id="doctorAvailability" class="form-control" readonly>
</div>

<div class="mb-3">
  <label>Select Date</label>
  <input type="date" id="date" class="form-control">
</div>

<div class="mb-3">
  <label>Available Slots</label>
  <div id="timeSlots"></div>
</div>

<div class="mb-3">
  <label>Symptoms</label>
  <textarea id="symptoms" class="form-control" rows="3"></textarea>
</div>

<button class="btn btn-primary w-100" onclick="bookAppointment()">Confirm Appointment</button>

<p id="message" class="text-center mt-3"></p>
<div id="summaryBox" class="summary-box"></div>

</div>

<script>
  const token = sessionStorage.getItem("token");
  if(!token) window.location.href="../login.html";
  
  const params = new URLSearchParams(window.location.search);
  const doctorId = params.get("doctorId");
  
  if(!doctorId){
    alert("Doctor not selected");
    window.location.href="patient-dashboard.html";
  }
  
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("date").setAttribute("min", today);
  
  async function loadDoctor(){
    const res = await fetch(
      `http://localhost:3000/patient/doctor/${doctorId}`,
      { headers:{ "Authorization":"Bearer "+token } }
    );
  
    const doctor = await res.json();
    if(!res.ok){ alert(doctor.message); return; }
  
    document.getElementById("doctorName").value = doctor.name;
    document.getElementById("doctorSpecialization").value = doctor.specialization;
  
    const start12 = convertTo12(doctor.start_time);
    const end12 = convertTo12(doctor.end_time);
  
    document.getElementById("doctorAvailability").value = start12+" - "+end12;
  
    generateSlots(doctor.start_time, doctor.end_time);
  }
  
  loadDoctor();
  
  function generateSlots(start,end){
    const container = document.getElementById("timeSlots");
    container.innerHTML="";
  
    let startTime = new Date("1970-01-01T"+start);
    let endTime = new Date("1970-01-01T"+end);
  
    while(startTime < endTime){
      const display = convertTo12(startTime.toTimeString().slice(0,8));
  
      const span = document.createElement("span");
      span.className="time-slot";
      span.textContent=display;
  
      span.onclick=()=>{
        document.querySelectorAll(".time-slot")
          .forEach(t=>t.classList.remove("selected-slot"));
        span.classList.add("selected-slot");
      };
  
      container.appendChild(span);
      startTime.setMinutes(startTime.getMinutes()+30);
    }
  }
  
  function convertTo12(timeStr){
    const dateObj = new Date("1970-01-01T"+timeStr);
    let h = dateObj.getHours();
    let m = dateObj.getMinutes();
    const p = h>=12?"PM":"AM";
    h = h%12 || 12;
    m = m<10?"0"+m:m;
    return h+":"+m+" "+p;
  }
  
  function convertTo24(time12h){
    const [time,modifier] = time12h.split(" ");
    let [h,m] = time.split(":");
    if(modifier==="PM" && h!=="12") h=parseInt(h)+12;
    if(modifier==="AM" && h==="12") h="00";
    return h+":"+m+":00";
  }
  
  async function bookAppointment(){
    const date = document.getElementById("date").value;
    const slot = document.querySelector(".selected-slot");
    const symptoms = document.getElementById("symptoms").value;
    const message = document.getElementById("message");
  
    if(!date || !slot || !symptoms){
      message.className="text-danger";
      message.textContent="Fill all fields";
      return;
    }
  
    const time24 = convertTo24(slot.textContent);
  
    // Create Razorpay Order
    const orderRes = await fetch(
      "http://localhost:3000/patient/create-order",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer "+token
        },
        body:JSON.stringify({ doctorId })
      }
    );
  
    const order = await orderRes.json();
  
    if(!orderRes.ok){
      message.className="text-danger";
      message.textContent="Order creation failed";
      return;
    }
  
    const options = {
      key: "rzp_test_SK4Bmk88FD8W5g",  // YOUR KEY HERE
      amount: order.amount,
      currency: order.currency,
      order_id: order.id,
  
      handler: async function (response) {
  
        const verifyRes = await fetch(
          "http://localhost:3000/patient/verify-payment",
          {
            method:"POST",
            headers:{
              "Content-Type":"application/json",
              "Authorization":"Bearer "+token
            },
            body:JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              doctorId,
              date,
              time: time24,
              symptoms
            })
          }
        );
  
        const data = await verifyRes.json();
  
        if(verifyRes.ok){
          message.className="text-success";
          message.textContent=data.message;
        }else{
          message.className="text-danger";
          message.textContent=data.message;
        }
      }
    };
  
    const rzp = new Razorpay(options);
    rzp.open();
  }
  </script>

</body>
</html>
