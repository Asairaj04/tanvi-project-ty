<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #0d9488;
      --gradient-health: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
      --bg-soft: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-soft);
      margin: 0;
      display: flex;
    }

    /* Sidebar (Consistent) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-health);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      color: #94a3b8;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 12px;
      font-weight: 500;
      transition: 0.3s;
      text-decoration: none;
    }

    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar .nav-link.active {
      background: var(--accent-color);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    /* Profile UI */
    .profile-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      overflow: hidden;
      max-width: 800px;
    }

    .profile-banner {
      background: var(--gradient-health);
      height: 140px;
      position: relative;
    }

    .avatar-wrapper {
      position: absolute;
      bottom: -50px;
      left: 40px;
      background: white;
      padding: 5px;
      border-radius: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .avatar-wrapper i {
      width: 100px;
      height: 100px;
      background: #f1f5f9;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--accent-color);
    }

    .profile-info {
      padding: 70px 40px 40px 40px;
    }

    .info-group {
      margin-bottom: 25px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 15px;
    }

    .info-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 5px;
      display: block;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
    }

    .logout-link { position: absolute; bottom: 30px; width: 100%; }
    .logout-btn { color: #f87171 !important; text-decoration: none; cursor: pointer; }
    
    .btn-edit {
        background: #f0fdfa;
        color: var(--accent-color);
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-edit:hover {
        background: var(--accent-color);
        color: white;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo-container">
    <h4>CLINIC PRO</h4>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link" href="patient-dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a>
    <a class="nav-link" href="doctors.html"><i class="bi bi-person-plus-fill me-2"></i>Doctors</a>
    <a class="nav-link" href="appointment_list.html"><i class="bi bi-calendar-check-fill me-2"></i>Visits</a>
    <a class="nav-link active" href="profile.html"><i class="bi bi-gear-fill me-2"></i>Profile</a>
  </nav>

  <div class="logout-link text-center">
    <a class="nav-link logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0">Account Settings</h2>
    <button class="btn-edit"><i class="bi bi-pencil-square me-2"></i>Edit Profile</button>
  </div>

  <div class="profile-card">
    <div class="profile-banner">
      <div class="avatar-wrapper">
        <i class="bi bi-person-bounding-box"></i>
      </div>
    </div>
    
    <div class="profile-info">
      <div class="row">
        <div class="col-md-6">
          <div class="info-group">
            <span class="info-label">Full Name</span>
            <span class="info-value" id="name">Loading...</span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-group">
            <span class="info-label">Email Address</span>
            <span class="info-value" id="email">Loading...</span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-group">
            <span class="info-label">Mobile Number</span>
            <span class="info-value" id="mobile">Loading...</span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-group">
            <span class="info-label">Home Address</span>
            <span class="info-value" id="address">Loading...</span>
          </div>
        </div>
      </div>
      
      <div class="alert alert-info border-0 bg-light mt-4 rounded-4 d-flex align-items-center">
        <i class="bi bi-shield-check fs-3 me-3 text-teal"></i>
        <div>
            <h6 class="mb-0 fw-bold">Verified Account</h6>
            <small class="text-muted">Your contact information is verified and secure.</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

// Fetch Profile
fetch("http://localhost:3000/profile",{
  headers:{ "Authorization": "Bearer " + token }
})
.then(res=>{
  if(!res.ok) throw new Error("Unauthorized");
  return res.json();
})
.then(data=>{
  document.getElementById("name").textContent = data.name || "Not Provided";
  document.getElementById("email").textContent = data.email || "Not Provided";
  document.getElementById("address").textContent = data.address || "Not Provided";
  document.getElementById("mobile").textContent = data.mobile_number || "Not Provided";
})
.catch(()=>{
  sessionStorage.removeItem("token");
  window.location.href = "login.html";
});

function logout(){
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
}
</script>

</body>
</html>
