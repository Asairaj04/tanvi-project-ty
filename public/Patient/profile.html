<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f6f9;
}

.dashboard-container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background-color: #0d6efd;
  color: white;
  min-height: 100vh;
  position: relative;
}

.sidebar .nav-link {
  color: white;
  padding: 12px 20px;
  transition: 0.3s;
}

.sidebar .nav-link:hover,
.sidebar .nav-link.active {
  background-color: rgba(255,255,255,0.2);
}

.logout-link {
  position: absolute;
  bottom: 20px;
  width: 100%;
}

/* Main Content */
.main-content {
  flex: 1;
  padding: 30px;
}

/* Profile Card */
.profile-card {
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="dashboard-container">

<!-- Sidebar -->
<div class="sidebar">
  <div class="p-4 text-center border-bottom">
    <img src="https://via.placeholder.com/80/ffffff/0d6efd?text=P" 
         class="rounded-circle mb-2 border border-light">
    <h5 class="fw-bold">Patient Portal</h5>
    <p class="small">Active Patient</p>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link" href="patient-dashboard.html">
      <i class="bi bi-house-door-fill me-2"></i>Dashboard
    </a>
    <a class="nav-link" href="doctors.html">
      <i class="bi bi-person-badge-fill me-2"></i>Doctors
    </a>
    <a class="nav-link" href="appointment_list.html">
      <i class="bi bi-calendar-check-fill me-2"></i>Appointments
    </a>
    <a class="nav-link" href="records.html">
      <i class="bi bi-file-earmark-medical-fill me-2"></i>Records
    </a>
    <a class="nav-link active" href="profile.html">
      <i class="bi bi-person-circle me-2"></i>Profile
    </a>
  </nav>

  <div class="logout-link text-center">
    <a class="nav-link" onclick="logout()">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </a>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <h2 class="mb-4">My Profile</h2>

  <div class="profile-card">
    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Email:</b> <span id="email"></span></p>
    <p><b>Address:</b> <span id="address"></span></p>
    <p><b>Mobile:</b> <span id="mobile"></span></p>

    <button class="btn btn-danger mt-3" onclick="logout()">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </div>
</div>

</div>

<script>

// 🔐 Get JWT token
const token = sessionStorage.getItem("token");

if(!token){
  alert("Please login first");
  window.location.href = "login.html";
}

// 🔄 Fetch profile using JWT
fetch("http://localhost:3000/profile",{
  headers:{
    "Authorization": "Bearer " + token
  }
})
.then(res=>{
  if(!res.ok) throw new Error("Unauthorized");
  return res.json();
})
.then(data=>{
  document.getElementById("name").textContent = data.name;
  document.getElementById("email").textContent = data.email;
  document.getElementById("address").textContent = data.address;
  document.getElementById("mobile").textContent = data.mobile_number;
})
.catch(()=>{
  alert("Session expired. Please login again.");
  sessionStorage.removeItem("token");
  window.location.href = "login.html";
});

// 🚪 Logout
function logout(){
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
