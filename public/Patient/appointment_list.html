<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctors - Patient Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard-container">

<!-- Sidebar (same as index.html) -->
<div class="sidebar">
  <div class="p-4 text-center border-bottom">
    <img src="https://via.placeholder.com/80/ffffff/007bff?text=P" class="rounded-circle mb-2 border border-light">
    <h5 class="fw-bold">Patient Portal</h5>
    <p class="small">Active Patient</p>
  </div>
  <nav class="nav flex-column">
    <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill me-2"></i>Dashboard</a>
    <a class="nav-link active" href="doctors.html"><i class="bi bi-person-badge-fill me-2"></i>Doctors</a>
    <a class="nav-link" href="appointments.html"><i class="bi bi-calendar-check-fill me-2"></i>Appointments</a>
    <a class="nav-link" href="records.html"><i class="bi bi-file-earmark-medical-fill me-2"></i>Records</a>
    <a class="nav-link" href="profile.html"><i class="bi bi-person-circle me-2"></i>Profile</a>
  </nav>
  <div class="logout-link">
    <a class="nav-link" id="logoutBtn" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <h3 class="mb-4 text-primary">Available Doctors</h3>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="doctor-card">
        <h5>Dr. Sharma</h5>
        <p>Ayurvedic Physician</p>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <span class="badge bg-success">Available</span><br><br>
        <button class="btn btn-outline-primary btn-sm">Book Appointment</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="doctor-card">
        <h5>Dr. Mehta</h5>
        <p>Panchakarma Specialist</p>
        <div class="rating">⭐⭐⭐☆☆</div>
        <span class="badge bg-warning text-dark">Busy</span><br><br>
        <button class="btn btn-outline-primary btn-sm">Book Appointment</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="doctor-card">
        <h5>Dr. Anjali Patil</h5>
        <p>Diet & Lifestyle Consultant</p>
        <div class="rating">⭐⭐⭐⭐⭐</div>
        <span class="badge bg-success">Available</span><br><br>
        <button class="btn btn-outline-primary btn-sm">Book Appointment</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
    // Logout functionality
document.addEventListener("DOMContentLoaded", () => {
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", e => {
        e.preventDefault();
        if (confirm("Log out now?")) {
          window.location.href = "login.html";
        }
      });
    }
  });
  
</script>
</body>
</html>
