<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Completed Treatments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f6f9;
}

.dashboard-container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background-color: #0d6efd;
  color: white;
  min-height: 100vh;
  position: relative;
}

.sidebar .nav-link {
  color: white;
  padding: 12px 20px;
  transition: 0.3s;
}

.sidebar .nav-link:hover,
.sidebar .nav-link.active {
  background-color: rgba(255,255,255,0.2);
}

.logout-link {
  position: absolute;
  bottom: 20px;
  width: 100%;
}

/* Main Content */
.main-content {
  flex: 1;
  padding: 30px;
}

.page-header {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="dashboard-container">

<!-- Sidebar -->
<div class="sidebar">
  <div class="p-4 text-center border-bottom">
    <img src="https://via.placeholder.com/80/ffffff/0d6efd?text=P" 
         class="rounded-circle mb-2 border border-light">
    <h5 class="fw-bold">Patient Portal</h5>
    <p class="small">Active Patient</p>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link" href="patient-dashboard.html">
      <i class="bi bi-house-door-fill me-2"></i>Dashboard
    </a>
    <a class="nav-link" href="doctors.html">
      <i class="bi bi-person-badge-fill me-2"></i>Doctors
    </a>
    <a class="nav-link active" href="patient-appointment-list.html">
      <i class="bi bi-calendar-check-fill me-2"></i>Appointments
    </a>
    <a class="nav-link" href="records.html">
      <i class="bi bi-file-earmark-medical-fill me-2"></i>Records
    </a>
    <a class="nav-link" href="profile.html">
      <i class="bi bi-person-circle me-2"></i>Profile
    </a>
  </nav>

  <div class="logout-link text-center">
    <a class="nav-link" id="logoutBtn" href="#">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </a>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">

  <div class="page-header">
    <h3 class="text-primary">
      <i class="bi bi-check-circle-fill me-2"></i>
      Completed Treatments
    </h3>
  </div>

  <div class="card shadow">
    <div class="card-body">
      <table class="table table-bordered">
        <thead class="table-primary">
          <tr>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Symptoms</th>
          </tr>
        </thead>
        <tbody id="appointmentTable"></tbody>
      </table>
    </div>
  </div>

</div>
</div>

<script>

/* Authentication Check */
const token = sessionStorage.getItem("token");
if(!token){
  window.location.href="../login.html";
}

/* Logout */
document.getElementById("logoutBtn").addEventListener("click", function(e) {
  e.preventDefault();
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
});

/* Load Completed Appointments */
async function loadAppointments(){

  const res = await fetch(
    "http://localhost:3000/patient/completed-appointments",
    {
      headers:{
        "Authorization":"Bearer " + token
      }
    }
  );

  if(res.status === 401 || res.status === 403){
    alert("Unauthorized access");
    return;
  }

  const data = await res.json();
  const table = document.getElementById("appointmentTable");
  table.innerHTML="";

  if(data.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="4" class="text-center text-muted">
          No completed treatments found
        </td>
      </tr>
    `;
    return;
  }

  data.forEach(app=>{
    table.innerHTML += `
      <tr>
        <td>${app.doctor_name}</td>
        <td>${app.appointment_date}</td>
        <td>${app.appointment_time}</td>
        <td>${app.symptoms}</td>
      </tr>
    `;
  });

}

loadAppointments();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
