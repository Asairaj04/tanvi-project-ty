<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completed Treatments | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #0d9488;
      --gradient-health: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
      --bg-soft: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-soft);
      margin: 0;
      display: flex;
    }

    /* Sidebar (Consistent) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-health);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      color: #94a3b8;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 12px;
      font-weight: 500;
      transition: 0.3s;
      text-decoration: none;
    }

    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar .nav-link.active {
      background: var(--accent-color);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    .page-header {
      margin-bottom: 30px;
    }

    .page-header h3 { font-weight: 700; color: #1e293b; }

    /* History Card Styling */
    .history-card {
      background: white;
      border-radius: 20px;
      border: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .table { margin-bottom: 0; }
    
    .table thead th {
      background-color: #f8fafc;
      color: #64748b;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 20px;
      border: none;
    }

    .table tbody td {
      padding: 20px;
      vertical-align: middle;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
    }

    .doc-name { font-weight: 600; color: #1e293b; }
    
    .date-badge {
      background: #f1f5f9;
      color: #475569;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .symptom-tag {
        font-size: 0.9rem;
        color: #64748b;
        max-width: 250px;
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .btn-action {
        color: var(--accent-color);
        background: #f0fdfa;
        border: none;
        padding: 8px 15px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.85rem;
        transition: 0.2s;
    }

    .btn-action:hover {
        background: var(--accent-color);
        color: white;
    }

    .logout-link { position: absolute; bottom: 30px; width: 100%; }
    .logout-btn { color: #f87171 !important; text-decoration: none; }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo-container">
    <h4>CLINIC PRO</h4>
  </div>

  <nav class="nav flex-column">
    <a class="nav-link" href="patient-dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a>
    <a class="nav-link" href="doctors.html"><i class="bi bi-person-plus-fill me-2"></i>Doctors</a>
    <a class="nav-link active" href="appointment-list.html"><i class="bi bi-calendar-check-fill me-2"></i>My Visits</a>
    <a class="nav-link" href="profile.html"><i class="bi bi-gear-fill me-2"></i>Profile</a>
  </nav>

  <div class="logout-link text-center">
    <a class="nav-link logout-btn" id="logoutBtn" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>
</div>

<div class="main-content">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h3><i class="bi bi-clock-history text-teal me-2"></i>Treatment History</h3>
    <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">
        <i class="bi bi-printer me-1"></i> Print History
    </button>
  </div>

  <div class="history-card">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Consulting Doctor</th>
            <th>Date & Time</th>
            <th>Reported Symptoms</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="appointmentTable">
          <tr>
            <td colspan="4" class="text-center py-5">
              <div class="spinner-border text-teal spinner-border-sm me-2"></div>
              Retrieving your medical history...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem("token");
if(!token) window.location.href="../login.html";

document.getElementById("logoutBtn").addEventListener("click", (e) => {
  e.preventDefault();
  sessionStorage.removeItem("token");
  window.location.href = "../login.html";
});

async function loadAppointments(){
  try {
    const res = await fetch("http://localhost:3000/patient/completed-appointments", {
      headers: { "Authorization": "Bearer " + token }
    });

    if(res.status === 401 || res.status === 403) return;

    const data = await res.json();
    const table = document.getElementById("appointmentTable");
    table.innerHTML="";

    if(data.length === 0){
      table.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">No completed treatments found in your records.</td></tr>`;
      return;
    }

    data.forEach(app => {
      table.innerHTML += `
        <tr>
          <td>
            <div class="d-flex align-items-center">
                <div class="bg-light rounded-circle p-2 me-3 text-teal">
                    <i class="bi bi-person-heart"></i>
                </div>
                <span class="doc-name">Dr. ${app.doctor_name}</span>
            </div>
          </td>
          <td>
            <span class="date-badge"><i class="bi bi-calendar-event me-1"></i> ${app.appointment_date}</span>
            <div class="small text-muted mt-1 ms-1"><i class="bi bi-clock me-1"></i> ${app.appointment_time}</div>
          </td>
          <td>
            <span class="symptom-tag" title="${app.symptoms}">${app.symptoms || 'Regular Checkup'}</span>
          </td>
          <td>
            <button class="btn-action"><i class="bi bi-file-earmark-pdf me-1"></i> Summary</button>
          </td>
        </tr>
      `;
    });
  } catch (error) {
    document.getElementById("appointmentTable").innerHTML = `<tr><td colspan="4" class="text-center text-danger">Unable to load history.</td></tr>`;
  }
}

loadAppointments();
</script>

</body>
</html>
