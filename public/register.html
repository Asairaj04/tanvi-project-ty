<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f0fa;
        }
        h1 {
            color: #6f42c1;
            margin-bottom: 40px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card-title {
            color: #4a1d96;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mt-5">Registration Portal</h1>
        <div class="row justify-content-center">

            <!-- Doctor Card -->
            <div class="col-md-4 mb-4">
                <div class="card text-center p-4">
                    <h3 class="card-title">Doctor Registration</h3>
                    <p>Register a new doctor account.</p>
                    <a href="./Doctor/Doctor Registration Page.html" class="btn btn-primary">Register</a>
                </div>
            </div>

            <!-- Patient Card -->
            <div class="col-md-4 mb-4">
                <div class="card text-center p-4">
                    <h3 class="card-title">Patient Registration</h3>
                    <p>Register a new patient account.</p>
                    <a href="./Patient/Patient Registration Page.html" class="btn btn-success">Register</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
