<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #6366f1;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --bg-light: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-light);
      margin: 0;
      display: flex;
    }

    /* Sidebar Styling (Matches Dashboard) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .sidebar a i { margin-right: 12px; }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar a.active {
      background: var(--accent-color);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    /* Content Styling */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    h2 { font-weight: 700; color: #1e293b; margin: 0; }

    /* Table Styling */
    .table-container {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .table {
      margin-bottom: 0;
    }

    .table thead th {
      background-color: #f8fafc;
      color: #64748b;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-top: none;
      padding: 15px;
    }

    .table tbody td {
      padding: 15px;
      vertical-align: middle;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
    }

    .patient-avatar {
      width: 35px;
      height: 35px;
      background: #e2e8f0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      color: var(--accent-color);
    }

    .logout-btn { color: #f87171 !important; margin-top: 50px !important; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo-container">
      <h4>CLINIC PRO</h4>
    </div>
    <a href="receptionist-dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
    <a href="receptionist-patient.html" class="active"><i class="fas fa-user-injured"></i> Patients</a>
    <a href="receptionist-appointment.html"><i class="fas fa-calendar-check"></i> Appointments</a>
    <a href="receptionist-payment.html"><i class="fas fa-credit-card"></i> Payments</a>
    <a href="receptionist-profile.html"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h2>Patient Directory</h2>
      <div class="d-flex gap-2">
        <input type="text" class="form-control form-control-sm" placeholder="Search patients..." style="width: 250px;">
        <button class="btn btn-primary btn-sm" style="background: var(--accent-color); border: none;">
          <i class="fas fa-plus me-1"></i> New Patient
        </button>
      </div>
    </div>

    <div class="table-container">
      <div class="table-responsive">
        <table class="table" id="table">
          <thead>
            <tr>
              <th>Patient Name</th>
              <th>Email Address</th>
              <th>Mobile Number</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="4" class="text-center py-4">Loading patient records...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem("token");

    fetch("http://localhost:3000/receptionist/patients",{
      headers:{ Authorization:"Bearer "+token }
    })
    .then(res=>res.json())
    .then(data=>{
      let rows = "";
      data.forEach(p => {
        rows += `
          <tr>
            <td>
              <div class="d-flex align-items-center">
                <div class="patient-avatar"><i class="fas fa-user"></i></div>
                <span class="fw-bold">${p.name}</span>
              </div>
            </td>
            <td><span class="text-muted">${p.email}</span></td>
            <td><span class="badge bg-light text-dark border">${p.mobile_number}</span></td>
            <td>
              <button class="btn btn-outline-secondary btn-sm"><i class="fas fa-eye"></i></button>
            </td>
          </tr>`;
      });
      document.getElementById("table-body").innerHTML = rows;
    })
    .catch(err => {
      document.getElementById("table-body").innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error loading data.</td></tr>`;
    });

    function logout(){
      sessionStorage.removeItem("token");
      window.location.href="../login.html";
    }
  </script>

</body>
</html>
