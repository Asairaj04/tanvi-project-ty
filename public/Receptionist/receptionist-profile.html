<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #6366f1;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --bg-light: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-light);
      margin: 0;
      display: flex;
    }

    /* Sidebar (Consistent Branding) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .sidebar a i { margin-right: 12px; }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar a.active {
      background: var(--accent-color);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    /* Content Area */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    h2 { font-weight: 700; color: #1e293b; margin-bottom: 30px; }

    /* Profile Card Styling */
    .profile-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      overflow: hidden;
      max-width: 600px;
    }

    .profile-header {
      background: var(--gradient-primary);
      height: 120px;
      position: relative;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      position: absolute;
      bottom: -50px;
      left: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--accent-color);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .profile-body {
      padding: 70px 30px 30px 30px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 8px;
    }

    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .form-control:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .btn-update {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: 600;
      width: 100%;
      transition: 0.3s;
    }

    .btn-update:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    #msg {
        font-size: 0.9rem;
        margin-top: 15px;
        text-align: center;
    }

    .logout-btn { color: #f87171 !important; margin-top: 50px !important; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo-container">
      <h4>CLINIC PRO</h4>
    </div>
    <a href="receptionist-dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
    <a href="receptionist-patient.html"><i class="fas fa-user-injured"></i> Patients</a>
    <a href="receptionist-appointment.html"><i class="fas fa-calendar-check"></i> Appointments</a>
    <a href="receptionist-payment.html"><i class="fas fa-credit-card"></i> Payments</a>
    <a href="receptionist-profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

  <div class="main-content">
    <h2>Account Settings</h2>

    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar">
          <i class="fas fa-user-tie"></i>
        </div>
      </div>
      
      <div class="profile-body">
        <div class="row">
          <div class="col-md-12">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
          </div>
          <div class="col-md-12">
            <label class="form-label">Email Address (Read-only)</label>
            <input type="email" id="email" class="form-control bg-light" disabled>
          </div>
          <div class="col-md-6">
            <label class="form-label">Mobile Number</label>
            <input type="text" id="mobile" class="form-control" placeholder="Mobile">
          </div>
          <div class="col-md-6">
            <label class="form-label">City/Address</label>
            <input type="text" id="address" class="form-control" placeholder="Address">
          </div>
        </div>
        
        <button class="btn-update" onclick="updateProfile()">
          <i class="fas fa-save me-2"></i> Save Changes
        </button>
        <p id="msg"></p>
      </div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem("token");

    if(!token){
      window.location.href="../../login.html";
    }

    // Load profile on page start
    function loadProfile() {
      fetch("http://localhost:3000/receptionist/profile",{
        headers:{ Authorization:"Bearer "+token }
      })
      .then(res=>res.json())
      .then(data=>{
        document.getElementById("name").value = data.name || "";
        document.getElementById("email").value = data.email || "";
        document.getElementById("mobile").value = data.mobile_number || "";
        document.getElementById("address").value = data.address || "";
      })
      .catch(err => console.error("Load error:", err));
    }

    loadProfile();

    // Update profile
    function updateProfile(){
      const msg = document.getElementById("msg");
      msg.innerHTML = "Updating...";
      msg.style.color = "#6366f1";

      // Assuming your backend expects a PUT/POST for updates 
      // I am keeping the fetch structure you provided
      fetch("http://localhost:3000/receptionist/profile", {
        method: "PUT", // Usually PUT for updates
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            mobile_number: document.getElementById("mobile").value,
            address: document.getElementById("address").value
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Update failed");
        return res.json();
      })
      .then(data => {
        msg.innerHTML = "Profile updated successfully!";
        msg.style.color = "#10b981";
        loadProfile(); // Refresh UI
      })
      .catch(error => {
        msg.innerHTML = "Error updating profile.";
        msg.style.color = "#f87171";
        console.error("Profile Update Error:", error);
      });
    }

    function logout(){
      sessionStorage.removeItem("token");
      window.location.href="../../login.html";
    }
  </script>

</body>
</html>
