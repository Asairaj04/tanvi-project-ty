<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments | Clinic Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #6366f1;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --bg-light: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-light);
      margin: 0;
      display: flex;
    }

    /* Sidebar (Consistent Branding) */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .sidebar a i { margin-right: 12px; }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar a.active {
      background: var(--accent-color);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    /* Content Styling */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    h2 { font-weight: 700; color: #1e293b; margin-bottom: 30px; }

    /* Table & UI Enhancements */
    .table-container {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .table thead th {
      background-color: #f8fafc;
      color: #64748b;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 15px;
      border: none;
    }

    .table tbody td {
      padding: 15px;
      vertical-align: middle;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
    }

    /* Status Badges */
    .badge-status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-completed { background: #dcfce7; color: #15803d; }
    .status-pending { background: #fef9c3; color: #a16207; }
    .status-cancelled { background: #fee2e2; color: #b91c1c; }
    .status-accepted { background: #e0e7ff; color: #4338ca; }

    .btn-cancel {
      border: 1px solid #f87171;
      color: #f87171;
      background: transparent;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .btn-cancel:hover {
      background: #f87171;
      color: white;
    }

    .logout-btn { color: #f87171 !important; margin-top: 50px !important; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo-container">
      <h4>CLINIC PRO</h4>
    </div>
    <a href="receptionist-dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
    <a href="receptionist-patient.html"><i class="fas fa-user-injured"></i> Patients</a>
    <a href="receptionist-appointment.html" class="active"><i class="fas fa-calendar-check"></i> Appointments</a>
    <a href="receptionist-payment.html"><i class="fas fa-credit-card"></i> Payments</a>
    <a href="receptionist-profile.html"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

  <div class="main-content">
    <h2>Appointment Schedules</h2>

    <div class="table-container">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="5" class="text-center py-4 text-muted">Fetching appointments...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem("token");

    function load(){
      fetch("http://localhost:3000/receptionist/appointments",{
        headers:{ Authorization:"Bearer "+token }
      })
      .then(res=>res.json())
      .then(data=>{
        let rows = "";
        data.forEach(a => {
          // Determine badge color based on status text
          const statusClass = a.status ? `status-${a.status.toLowerCase()}` : 'status-pending';
          
          rows += `
            <tr>
              <td class="fw-bold">${a.patient_name || a.name || "N/A"}</td>
              <td><i class="far fa-calendar-alt me-2 text-muted"></i>${a.appointment_date}</td>
              <td><i class="far fa-clock me-2 text-muted"></i>${a.appointment_time}</td>
              <td><span class="badge-status ${statusClass}">${a.status}</span></td>
              <td>
                ${a.status !== 'cancelled' ? 
                  `<button class="btn-cancel" onclick="cancel(${a.id})"><i class="fas fa-times me-1"></i> Cancel</button>` : 
                  `<span class="text-muted small">No Action</span>`}
              </td>
            </tr>`;
        });
        document.getElementById("table-body").innerHTML = rows;
      })
      .catch(err => {
        document.getElementById("table-body").innerHTML = `<tr><td colspan="5" class="text-center text-danger">Failed to load appointments.</td></tr>`;
      });
    }

    function cancel(id){
      if(confirm("Are you sure you want to cancel this appointment?")) {
        fetch("http://localhost:3000/receptionist/cancel/"+id,{
          method:"PUT",
          headers:{ Authorization:"Bearer "+token }
        })
        .then(()=>load());
      }
    }

    load();

    function logout(){
      sessionStorage.removeItem("token");
      window.location.href="../login.html";
    }
  </script>

</body>
</html>
