<!DOCTYPE html>
<html>
<head>
  <title>Add Receptionist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Colorful Internal CSS */
    body {
      /* A vibrant blue-to-purple gradient background */
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .form-container {
      width: 100%;
      max-width: 450px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      border-top: 8px solid #00d2ff; /* Bright accent border */
    }

    h3 {
      color: #4a148c; /* Deep Purple */
      font-weight: 800;
      text-align: center;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 25px;
      font-size: 0.9rem;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 2px solid #eee;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      background-color: #fcfcfc;
    }

    /* Each input glows a different color when clicked! */
    #name:focus { border-color: #00d2ff; box-shadow: 0 0 8px rgba(0, 210, 255, 0.3); }
    #email:focus { border-color: #ff4b2b; box-shadow: 0 0 8px rgba(255, 75, 43, 0.3); }
    #mobile:focus { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.3); }
    #address:focus { border-color: #f1c40f; box-shadow: 0 0 8px rgba(241, 196, 15, 0.3); }
    #password:focus { border-color: #9b59b6; box-shadow: 0 0 8px rgba(155, 89, 182, 0.3); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 1.1rem;
      /* Vibrant multi-color gradient button */
      background: linear-gradient(to right, #00d2ff, #3a7bd5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(58, 123, 213, 0.4);
      background: linear-gradient(to right, #3a7bd5, #00d2ff);
    }

    .btn-primary:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="form-container">
  <h3>Add Staff</h3>
  <p class="subtitle">Enter receptionist details below</p>

  <form id="receptionistForm">
    <input type="text" id="name" class="form-control" placeholder="Full Name" required>
    
    <input type="email" id="email" class="form-control" placeholder="Email Address" required>
    
    <input type="text" id="mobile" class="form-control" placeholder="Mobile Number" maxlength="10" required>
    
    <input type="text" id="address" class="form-control" placeholder="Complete Address" required>
    
    <input type="password" id="password" class="form-control" placeholder="Create Password" required>
    
    <button type="submit" class="btn btn-primary" id="submitBtn">Add Receptionist</button>
  </form>
</div>

<script>
document.getElementById("receptionistForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  const token = sessionStorage.getItem("token");

  if (!token) {
    alert("Doctor not logged in");
    return;
  }

  // Visual feedback
  btn.innerText = "Saving...";
  btn.style.opacity = "0.7";

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile_number = document.getElementById("mobile").value;
  const address = document.getElementById("address").value;
  const password = document.getElementById("password").value;

  try {
    const response = await fetch("http://localhost:3000/doctor/add-receptionist", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        name: name,
        email: email,
        mobile_number: mobile_number,
        address: address,
        password: password
      })
    });

    const data = await response.json();
    alert(data.message);
    
    if(response.ok) document.getElementById("receptionistForm").reset();

  } catch (error) {
    alert("Server error");
  } finally {
    btn.innerText = "Add Receptionist";
    btn.style.opacity = "1";
  }

});
</script>

</body>
</html>
