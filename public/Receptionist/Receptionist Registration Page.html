<!DOCTYPE html>
<html>
<head>
  <title>Add Receptionist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>Add Receptionist</h3>

<form id="receptionistForm">

  <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>

  <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

  <input type="text" id="mobile" class="form-control mb-2" placeholder="Mobile Number" required>

  <input type="text" id="address" class="form-control mb-2" placeholder="Address" required>

  <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

  <button class="btn btn-primary">Add Receptionist</button>

</form>

<script>
document.getElementById("receptionistForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const token = sessionStorage.getItem("token");

  if (!token) {
    alert("Doctor not logged in");
    return;
  }

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile_number = document.getElementById("mobile").value;
  const address = document.getElementById("address").value;
  const password = document.getElementById("password").value;

  try {
    const response = await fetch("http://localhost:3000/doctor/add-receptionist", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        name: name,
        email: email,
        mobile_number: mobile_number,
        address: address,
        password: password
      })
    });

    const data = await response.json();
    alert(data.message);

  } catch (error) {
    alert("Server error");
  }

});
</script>

</body>
</html>
