<!DOCTYPE html>
<html>
<head>
  <title>Receptionist Dashboard</title>
  <style>
    body { margin:0; font-family:Arial; display:flex; }
    .sidebar {
      width:220px;
      background:#1e293b;
      color:white;
      height:100vh;
      padding:20px;
    }
    .sidebar a {
      display:block;
      color:white;
      text-decoration:none;
      padding:10px;
      margin:8px 0;
      border-radius:6px;
    }
    .sidebar a:hover { background:#334155; }
    .logo { text-align:center; margin-bottom:30px; }
    .content { flex:1; padding:30px; background:#f1f5f9; }
    .card {
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h4 class="logo">Clinic Panel</h4>
    <a href="receptionist-dashboard.html">Dashboard</a>
    <a href="receptionist-patient.html">Patients</a>
    <a href="receptionist-appointment.html">Appointments</a>
    <a href="receptionist-payment.html">Payments</a>
    <a href="receptionist-profile.html">Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

<div class="content">
  <h2>Dashboard</h2>
  <div id="stats"></div>
</div>

<script>
const token = sessionStorage.getItem("token");
if(!token) window.location.href="../login.html";

fetch("http://localhost:3000/receptionist/dashboard",{
  headers:{ Authorization:"Bearer "+token }
})
.then(res=>res.json())
.then(data=>{
  document.getElementById("stats").innerHTML=`
    <div class="card">Total Appointments: ${data.totalAppointments}</div>
    <div class="card">Pending: ${data.pending}</div>
    <div class="card">Accepted: ${data.accepted}</div>
    <div class="card">Completed: ${data.completed}</div>
    <div class="card">Cancelled: ${data.cancelled}</div>
  `;
});

function logout(){
  sessionStorage.removeItem("token");
  window.location.href="../login.html";
}
</script>

</body>
</html>
