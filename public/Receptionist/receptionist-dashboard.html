<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receptionist Dashboard | Premium</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent-color: #6366f1;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --bg-light: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-light);
      margin: 0;
      display: flex;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: white;
      height: 100vh;
      position: fixed;
      transition: all 0.3s;
      box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo-container {
      padding: 30px 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .logo-container h4 {
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 25px;
      margin: 4px 15px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .sidebar a i { margin-right: 12px; font-size: 1.1rem; }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .sidebar a.active {
      background: var(--accent-color);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    /* Content Area */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 40px;
    }

    h2 {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 30px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .stat-card {
      background: white;
      border: none;
      border-radius: 16px;
      padding: 25px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }

    .stat-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--gradient-primary);
    }

    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f172a;
    }

    .logout-btn { color: #f87171 !important; margin-top: 50px !important; }
    .logout-btn:hover { background: rgba(248, 113, 113, 0.1) !important; }

  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo-container">
      <h4>CLINIC PRO</h4>
    </div>
    <a href="receptionist-dashboard.html" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a>
    <a href="receptionist-patient.html"><i class="fas fa-user-injured"></i> Patients</a>
    <a href="receptionist-appointment.html"><i class="fas fa-calendar-check"></i> Appointments</a>
    <a href="receptionist-payment.html"><i class="fas fa-credit-card"></i> Payments</a>
    <a href="receptionist-profile.html"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

  <div class="main-content">
    <h2>Welcome Back, Receptionist</h2>
    
    <div id="stats" class="stats-grid">
      <div class="text-muted">Loading dashboard statistics...</div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem("token");
    if(!token) window.location.href="../login.html";

    fetch("http://localhost:3000/receptionist/dashboard",{
      headers:{ Authorization:"Bearer "+token }
    })
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("stats").innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Appointments</div>
          <div class="stat-value">${data.totalAppointments}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label text-warning">Pending</div>
          <div class="stat-value">${data.pending}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label text-info">Accepted</div>
          <div class="stat-value">${data.accepted}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label text-success">Completed</div>
          <div class="stat-value">${data.completed}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label text-danger">Cancelled</div>
          <div class="stat-value">${data.cancelled}</div>
        </div>
      `;
    })
    .catch(err => {
        document.getElementById("stats").innerHTML = `<div class="alert alert-danger w-100">Failed to load statistics.</div>`;
    });

    function logout(){
      sessionStorage.removeItem("token");
      window.location.href="../login.html";
    }
  </script>

</body>
</html>
