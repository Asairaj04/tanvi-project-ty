<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  height: 100vh;
  background: linear-gradient(135deg, #6f42c1, #4e73df);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
}

.login-card {
  width: 420px;
  padding: 35px;
  border-radius: 18px;
  background: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.login-card h3 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 700;
  color: #6f42c1;
}

.btn-purple {
  background-color: #6f42c1;
  color: white;
  font-weight: 600;
  border-radius: 10px;
}

.btn-purple:hover {
  background-color: #5a379e;
}
</style>
</head>

<body>

<div class="login-card">

  <h3>User Login</h3>

  <form id="loginForm">

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-purple w-100">Login</button>

  </form>

  <div id="message" class="mt-3 text-center"></div>

  <div class="text-center mt-3">
    <small>Don't have an account? <a href="register.html">Register here</a></small>
  </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const res = await fetch("http://localhost:3000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("message").innerHTML =
        `<span class="text-danger">${data.message}</span>`;
      return;
    }

    // Store JWT
    sessionStorage.setItem("token", data.token);

    // Decode JWT
    const payload = JSON.parse(atob(data.token.split('.')[1]));
    const rid = payload.rid;

    // Redirect by role
    if (rid === 0) {
      window.location.href = "../public/Admin/admin-dashboard.html";
    }
    else if (rid === 1) {
      window.location.href = "../public/Doctor/doctor-dashboard.html";
    }
    else if (rid === 2) {
      window.location.href = "../public/Receptionist/receptionist-dashboard.html";
    }
    else if (rid === 3) {
      window.location.href = "../public/Patient/patient-dashboard.html";
    }
    else {
      document.getElementById("message").innerHTML =
        `<span class="text-danger">Unknown role</span>`;
    }

  } catch (error) {
    document.getElementById("message").innerHTML =
      `<span class="text-danger">Server error. Try again later.</span>`;
  }

});
</script>

</body>
</html>
