<!DOCTYPE html>
<html>
<head>
<title>Accepted Doctors - Ayurveda Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success px-4">
<span class="navbar-brand fw-bold">
<i class="bi bi-flower1"></i> Ayurveda Admin Dashboard
</span>
<button class="btn btn-light btn-sm">Logout</button>
</nav>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 col-lg-2 sidebar">
<ul class="nav flex-column">

<li class="nav-item">
<a class="nav-link" href="admin dashboard.html">
<i class="bi bi-person-check"></i> Doctor Requests
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="Doctor_admin_list.html">
<i class="bi bi-people"></i> Accepted Doctors
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="clinics.html">
<i class="bi bi-hospital"></i> Clinics
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="products.html">
<i class="bi bi-capsule"></i> Products
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="feedback.html">
<i class="bi bi-chat-dots"></i> Feedback
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="stats.html">
<i class="bi bi-bar-chart"></i> Statistics
</a>
</li>

</ul>
</div>

<!-- CONTENT -->
<div class="col-md-9 col-lg-10 p-4">
<div class="content-section">
<h4>Accepted Doctors</h4>

<div class="table-responsive">
<table class="table table-bordered table-hover align-middle">
<thead class="table-success">
<tr>
<th>Name</th>
<th>Email</th>
<th>Mobile Number</th>
<th>Address</th>
<th>Specialization</th>
<th>Created At</th>
<th>Certificate</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="acceptedDoctors"></tbody>
</table>
</div>

</div>
</div>

</div>
</div>

<script>

    const BASE_URL = "http://localhost:3000";
    
    // ===============================
    // LOAD ACCEPTED DOCTORS
    // ===============================
    function loadDoctors() {
    
    fetch(`${BASE_URL}/admin/doctor-requests`)
    .then(response => response.json())
    .then(data => {
    
    const tableBody = document.getElementById("acceptedDoctors");
    tableBody.innerHTML = "";
    
    if (!data || data.length === 0) {
    tableBody.innerHTML = `
    <tr>
    <td colspan="7" class="text-center">No accepted doctors found</td>
    </tr>`;
    return;
    }
    
    data.forEach(doctor => {
    
    tableBody.innerHTML += `
    <tr>
    <td>${doctor.name || ""}</td>
    <td>${doctor.email || ""}</td>
    <td>${doctor.mobile_number || ""}</td>
    <td>${doctor.address || ""}</td>
    <td>${doctor.specialization || ""}</td>
    <td>${doctor.created_at ? new Date(doctor.created_at).toLocaleDateString() : ""}</td>
    <td>
    ${doctor.certificate 
    ? `<a href="${BASE_URL}/uploads/${doctor.certificate}" target="_blank" class="btn btn-sm btn-primary">
    <i class="bi bi-file-earmark"></i>
    </a>` 
    : "N/A"}
    </td>
    <td>
    
    <button class="btn btn-success btn-sm me-1"
    onclick="updateStatus(${doctor.id}, 'accepted')">
    <i class="bi bi-check-circle-fill"></i>
    </button>
    
    <button class="btn btn-danger btn-sm"
    onclick="updateStatus(${doctor.id}, 'rejected')">
    <i class="bi bi-x-circle-fill"></i>
    </button>
    
    </td>
    </tr>
    `;
    
    });
    
    })
    .catch(error => {
    console.error("Error loading doctors:", error);
    
    document.getElementById("acceptedDoctors").innerHTML = `
    <tr>
    <td colspan="7" class="text-center text-danger">
    Failed to load data
    </td>
    </tr>`;
    });
    }
    
    // ===============================
    // UPDATE DOCTOR STATUS
    // ===============================
    function updateStatus(id, status) {
    
    if (!confirm("Are you sure you want to update this doctor?")) return;
    
    fetch(`${BASE_URL}/admin/update-status/${id}`, {
    method: "PUT",
    headers: {
    "Content-Type": "application/json"
    },
    body: JSON.stringify({ status: status })
    })
    .then(response => response.json())
    .then(data => {
    alert("Status updated successfully");
    loadDoctors(); // Reload table
    })
    .catch(error => {
    console.error("Update error:", error);
    alert("Failed to update status");
    });
    }
    
    // ===============================
    // INITIAL LOAD
    // ===============================
    document.addEventListener("DOMContentLoaded", function() {
    loadDoctors();
    });
    
    </script>
    
</body>
</html>
