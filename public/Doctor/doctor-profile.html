<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }

.sidebar {
  width:250px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#6f42c1,#4e73df);
  color:white;
  padding-top:20px;
}

.sidebar h4{
  text-align:center;
  margin-bottom:30px;
}

.sidebar a {
  display:block;
  color:white;
  padding:12px 20px;
  text-decoration:none;
}

.sidebar a:hover {
  background:rgba(255,255,255,0.2);
}

.sidebar a.active {
  background:rgba(255,255,255,0.3);
  font-weight:bold;
}

.main-content {
  margin-left:250px;
  padding:30px;
}

.card {
  border-radius:15px;
  box-shadow:0 8px 18px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Doctor Panel</h4>
  <a href="doctor-dashboard.html">Dashboard</a>
  <a href="doctor-appointment.html">Appointments</a>
  <a href="doctor-profile.html" class="active">My Profile</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <h2>My Profile</h2>

  <!-- Add Receptionist Button -->
  <button class="btn btn-success mb-3" onclick="addReceptionist()">
    Add Receptionist
  </button>

  <div class="card p-4">

    <p><strong>Name:</strong> <span id="docName"></span></p>
    <p><strong>Email:</strong> <span id="docEmail"></span></p>
    <p><strong>Mobile:</strong> <span id="docMobile"></span></p>
    <p><strong>Address:</strong> <span id="docAddress"></span></p>

    <div class="mb-3">
      <label><strong>City</strong></label>
      <input type="text" id="docCity" class="form-control">
    </div>

    <hr>

    <div class="mb-3">
      <label><strong>Availability</strong></label>
      <select id="availability" class="form-control">
        <option value="ON">ON</option>
        <option value="OFF">OFF</option>
      </select>
    </div>

    <div class="row">
      <div class="col-md-6">
        <label><strong>Start Time</strong></label>
        <input type="time" id="startTime" class="form-control">
      </div>
      <div class="col-md-6">
        <label><strong>End Time</strong></label>
        <input type="time" id="endTime" class="form-control">
      </div>
    </div>

    <button class="btn btn-primary mt-4" onclick="saveProfile()">
      Save Changes
    </button>

  </div>

</div>

<script>

function checkAuth(){
  const token = sessionStorage.getItem("token");
  if(!token){
    window.location.href="../login.html";
  }
}
checkAuth();

async function loadProfile(){

  const token = sessionStorage.getItem("token");

  const res = await fetch("http://localhost:3000/doctor/profile",{
    headers:{ "Authorization":"Bearer " + token }
  });

  const data = await res.json();

  document.getElementById("docName").innerText = data.name;
  document.getElementById("docEmail").innerText = data.email;
  document.getElementById("docMobile").innerText = data.mobile_number;
  document.getElementById("docAddress").innerText = data.address;
  document.getElementById("docCity").value = data.city || "";
  document.getElementById("availability").value = data.availability;
  document.getElementById("startTime").value = data.start_time?.substring(0,5);
  document.getElementById("endTime").value = data.end_time?.substring(0,5);
}

loadProfile();

async function saveProfile(){

  const token = sessionStorage.getItem("token");

  const city = document.getElementById("docCity").value;
  const availability = document.getElementById("availability").value;
  const startTime = document.getElementById("startTime").value + ":00";
  const endTime = document.getElementById("endTime").value + ":00";

  const res = await fetch("http://localhost:3000/doctor/update-profile",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      city,
      availability,
      startTime,
      endTime
    })
  });

  const data = await res.json();
  alert(data.message);
}

function addReceptionist(){
  window.location.href="../Receptionist/Receptionist Registration Page.html";
}

function logout(){
  sessionStorage.removeItem("token");
  window.location.href="../login.html";
}

</script>

</body>
</html>
