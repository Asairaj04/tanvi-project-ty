<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }

.sidebar {
  width:250px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#6f42c1,#4e73df);
  color:white;
  padding-top:20px;
}

.sidebar h4{
  text-align:center;
  margin-bottom:30px;
}

.sidebar a {
  display:block;
  color:white;
  padding:12px 20px;
  text-decoration:none;
}

.sidebar a:hover {
  background:rgba(255,255,255,0.2);
}

.sidebar a.active {
  background:rgba(255,255,255,0.3);
  font-weight:bold;
}

.main-content {
  margin-left:250px;
  padding:30px;
}

.card {
  border-radius:15px;
  box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.status-toggle {
  width:60px;
  height:30px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Doctor Panel</h4>
  <a href="doctor-dashboard.html">Dashboard</a>
  <a href="doctor-appointments.html">Appointments</a>
  <a href="doctor-profile.html" class="active">My Profile</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <h2>My Profile</h2>

  <div class="card p-4 mt-3">

    <p><strong>Name:</strong> <span id="docName">Loading...</span></p>
    <p><strong>Email:</strong> <span id="docEmail">Loading...</span></p>
    <p><strong>Mobile:</strong> <span id="docMobile">Loading...</span></p>
    <p><strong>Address:</strong> <span id="docAddress">Loading...</span></p>

    <hr>

    <!-- Availability -->
    <div class="mb-3">
      <label class="form-label"><strong>Availability Status</strong></label><br>
      <div class="form-check form-switch">
        <input class="form-check-input status-toggle" type="checkbox" id="availabilityToggle">
        <label class="form-check-label" id="statusLabel">OFF</label>
      </div>
    </div>

    <!-- Slot Timing -->
    <div class="row mt-3">
      <div class="col-md-6">
        <label class="form-label"><strong>Start Time</strong></label>
        <input type="time" class="form-control" id="startTime">
      </div>
      <div class="col-md-6">
        <label class="form-label"><strong>End Time</strong></label>
        <input type="time" class="form-control" id="endTime">
      </div>
    </div>

    <button class="btn btn-primary mt-4" onclick="saveProfile()">Save Changes</button>

  </div>

</div>

<script>

// ===============================
// AUTH CHECK
// ===============================
function checkAuth(){
  const token = sessionStorage.getItem("token");
  if(!token){
    window.location.href="login.html";
  }
}
checkAuth();

// ===============================
// TIME CONVERSION FUNCTIONS
// ===============================

// Convert 24hr (DB) → 12hr (Display)
function convertTo12Hour(time24){

  if(!time24) return "";

  let [hours, minutes] = time24.split(":");
  hours = parseInt(hours);

  let period = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12;

  return `${hours.toString().padStart(2,'0')}:${minutes} ${period}`;
}

// Convert 12hr → 24hr (Before Saving)
function convertTo24Hour(time12){

  if(!time12) return "";

  let [time, period] = time12.split(" ");
  let [hours, minutes] = time.split(":");

  hours = parseInt(hours);

  if(period === "PM" && hours < 12){
    hours += 12;
  }

  if(period === "AM" && hours === 12){
    hours = 0;
  }

  return `${hours.toString().padStart(2,'0')}:${minutes}:00`;
}

// ===============================
// LOAD PROFILE
// ===============================
async function loadProfile(){

  const token = sessionStorage.getItem("token");

  try{
    const res = await fetch("http://localhost:3000/doctor/profile",{
      headers:{
        "Authorization":"Bearer " + token
      }
    });

    const data = await res.json();

    if(res.status !== 200){
      alert(data.message);
      return;
    }

    document.getElementById("docName").innerText = data.name;
    document.getElementById("docEmail").innerText = data.email;
    document.getElementById("docMobile").innerText = data.mobile_number;
    document.getElementById("docAddress").innerText = data.address;

    // Availability
    const toggle = document.getElementById("availabilityToggle");
    const label = document.getElementById("statusLabel");

    toggle.checked = data.availability === "ON";
    label.innerText = toggle.checked ? "ON" : "OFF";

    // Convert DB 24hr → input 24hr format
    document.getElementById("startTime").value = data.start_time ? data.start_time.substring(0,5) : "";
    document.getElementById("endTime").value = data.end_time ? data.end_time.substring(0,5) : "";

  }catch(err){
    alert("Error loading profile");
  }
}

loadProfile();

// ===============================
// TOGGLE LABEL
// ===============================
const toggle = document.getElementById("availabilityToggle");
const label = document.getElementById("statusLabel");

toggle.addEventListener("change",function(){
  label.innerText = this.checked ? "ON" : "OFF";
});

// ===============================
// SAVE PROFILE
// ===============================
async function saveProfile(){

  const token = sessionStorage.getItem("token");

  const availability = toggle.checked ? "ON" : "OFF";

  // input type="time" already gives 24hr
  const startTime = document.getElementById("startTime").value + ":00";
  const endTime = document.getElementById("endTime").value + ":00";

  try{
    const res = await fetch("http://localhost:3000/doctor/update-profile",{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body:JSON.stringify({
        availability,
        startTime,
        endTime
      })
    });

    const data = await res.json();
    alert(data.message);

  }catch(err){
    alert("Error saving profile");
  }
}

// ===============================
// LOGOUT
// ===============================
function logout(){
  sessionStorage.removeItem("token");
  window.location.href="login.html";
}

</script>

</body>
</html>
