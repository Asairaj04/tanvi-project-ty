<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Registration</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background-image: url("https://images.unsplash.com/photo-1582750433449-648ed127bb54?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .registration-box {
      background: rgba(255, 255, 255, 0.94);
      padding: 40px 50px;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      max-width: 720px;
      width: 100%;
      backdrop-filter: blur(8px);
    }

    h2 {
      color: #6f42c1;
      text-align: center;
      margin-bottom: 25px;
      font-weight: 700;
    }

    .form-label {
      color: #4a1d96;
      font-weight: 600;
    }

    .btn-register {
      background: linear-gradient(135deg, #6f42c1, #8b5cf6);
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      color: white;
      transition: 0.3s ease;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(111, 66, 193, 0.4);
    }

    .form-control:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
    }
  </style>
</head>

<body>
  <div class="registration-box">
    <h2>Doctor Registration</h2>

    <form id="doctorForm" enctype="multipart/form-data">

      <div class="mb-3">
        <label for="doctorName" class="form-label">Name</label>
        <input type="text" class="form-control" id="doctorName" required 
          pattern="[A-Za-z\s]+" 
          title="Name must contain only letters and spaces" />
      </div>

      <div class="mb-3">
        <label for="doctorSpecialization" class="form-label">Specialization</label>
        <input type="text" class="form-control" id="doctorSpecialization" required />
      </div>

      <!-- Address Field Added -->
      <div class="mb-3">
        <label for="doctorAddress" class="form-label">Address</label>
        <textarea 
          class="form-control" 
          id="doctorAddress" 
          rows="3" 
          required
        ></textarea>
      </div>

      <div class="mb-3">
        <label for="doctorMobile" class="form-label">Mobile Number</label>
        <input 
          type="tel" 
          class="form-control" 
          id="doctorMobile" 
          required
          pattern="[0-9]{10}"
          maxlength="10"
          title="Enter exactly 10 digit mobile number"
        />
      </div>
      

      <div class="mb-3">
        <label for="doctorEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="doctorEmail" required />
      </div>

      <div class="mb-3">
        <label for="doctorPassword" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="doctorPassword"
          required
          pattern="^(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$"
          title="Password must be at least 8 characters and include a special character"
        />
      </div>

      <div class="mb-3">
        <label for="doctorConfirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="doctorConfirmPassword" required />
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="togglePassword" />
        <label class="form-check-label" for="togglePassword">Show Password</label>
      </div>

      <div class="mb-3">
        <label for="doctorCertificate" class="form-label">Upload Certification</label>
        <input type="file" class="form-control" id="doctorCertificate" accept="image/*,.pdf" required />
      </div>

      <button type="submit" class="btn-register">Register Doctor</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("doctorForm");
    const togglePassword = document.getElementById("togglePassword");
    const passwordField = document.getElementById("doctorPassword");
    const confirmPasswordField = document.getElementById("doctorConfirmPassword");

    togglePassword.addEventListener("change", () => {
      const type = togglePassword.checked ? "text" : "password";
      passwordField.type = type;
      confirmPasswordField.type = type;
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("doctorName").value;
      const specialization = document.getElementById("doctorSpecialization").value;
      const address = document.getElementById("doctorAddress").value;
      const mobile = document.getElementById("doctorMobile").value;
      const email = document.getElementById("doctorEmail").value;
      const password = passwordField.value;
      const confirmPassword = confirmPasswordField.value;
      const certificateFile = document.getElementById("doctorCertificate").files[0];

      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      const formData = new FormData();
      formData.append("name", name);
      formData.append("specialization", specialization);
      formData.append("address", address);
      formData.append("mobile_number", mobile);
      formData.append("email", email);
      formData.append("password", password);
      formData.append("certificate", certificateFile);

      try {
        const res = await fetch("http://localhost:3000/register-doctor", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();
        alert(data.message || "Doctor registered successfully");
        form.reset();
      } catch (error) {
        console.error(error);
        alert("Error registering doctor");
      }
    });
  </script>
</body>
</html>
