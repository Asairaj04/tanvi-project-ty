<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Appointments</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }
.sidebar {
  width:250px; height:100vh; position:fixed;
  background:linear-gradient(180deg,#6f42c1,#4e73df);
  color:white; padding-top:20px;
}
.sidebar a {
  display:block; color:white; padding:12px 20px;
  text-decoration:none;
}
.sidebar a:hover { background:rgba(255,255,255,0.2); }
.sidebar a.active { background:rgba(255,255,255,0.3); font-weight:bold; }
.main-content { margin-left:250px; padding:30px; }
</style>
</head>

<body>

<div class="sidebar">
  <h4 class="text-center">Doctor Panel</h4>
  <a href="doctor-dashboard.html">Dashboard</a>
  <a href="doctor-appointment.html" class="active">Appointments</a>
  <a href="doctor-profile.html">My Profile</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main-content">
  <h2>Appointments</h2>

  <table class="table table-bordered mt-3">
    <thead class="table-light">
      <tr>
        <th>Patient</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="appointmentTable">
    </tbody>
  </table>

</div>

<script>

const token = sessionStorage.getItem("token");

if(!token){
  alert("Please login first");
  window.location.href="login.html";
}

// ===============================
// LOAD DOCTOR APPOINTMENTS
// ===============================
async function loadAppointments(){

  try{

    const res = await fetch(
      "http://localhost:3000/doctor/appointments",
      {
        headers:{
          "Authorization":"Bearer " + token
        }
      }
    );

    if(res.status === 401 || res.status === 403){
      alert("Unauthorized access. Please login again.");
      sessionStorage.removeItem("token");
      window.location.href="login.html";
      return;
    }

    const data = await res.json();

    const table = document.getElementById("appointmentTable");
    table.innerHTML = "";

    if(data.length === 0){
      table.innerHTML = `<tr><td colspan="4" class="text-center">No appointments found</td></tr>`;
      return;
    }

    data.forEach(app => {

      let badgeClass = "bg-warning";
      if(app.status === "accepted") badgeClass = "bg-primary";
      if(app.status === "completed") badgeClass = "bg-success";

      const row = `
        <tr>
          <td>${app.patient_name}</td>
          <td>${app.appointment_date}</td>
          <td>${app.appointment_time}</td>
          <td><span class="badge ${badgeClass}">${app.status}</span></td>
        </tr>
      `;

      table.innerHTML += row;

    });

  }catch(err){
    console.log("Error:", err);
    alert("Something went wrong");
  }

}

loadAppointments();

function logout(){
  sessionStorage.removeItem("token");
  window.location.href="login.html";
}

</script>

</body>
</html>
